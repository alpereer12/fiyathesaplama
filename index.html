<!DOCTYPE html>
<html lang="tr" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ofset Kutu Maliyet Paneli (Pro UX Edition)</title>
    
    <!-- Google Fonts: Plus Jakarta Sans (Modern UI Trend) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Kütüphaneler -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#312e81',
                            950: '#1e1b4b',
                        },
                        darkbg: '#09090b', // Deep OLED black/gray
                        darkcard: '#18181b', // Slight elevation
                        darkinput: '#27272a'
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.05)',
                        'glass-dark': '0 8px 32px 0 rgba(0, 0, 0, 0.3)',
                        'glow': '0 0 20px rgba(79, 70, 229, 0.4)',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-2px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(4px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-6px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(6px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { 
            transition: background-color 0.4s ease, color 0.4s ease; 
            -webkit-tap-highlight-color: transparent;
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at bottom left, rgba(99, 102, 241, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
        }
        html.dark body {
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at bottom left, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
        }
        
        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        html.dark ::-webkit-scrollbar-thumb { background: #3f3f46; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        
        /* Modern Form Elements */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        html.dark .glass-panel {
            background: rgba(24, 24, 27, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-modern {
            @apply w-full px-4 py-3 rounded-2xl bg-slate-50 dark:bg-darkinput border border-slate-200 dark:border-slate-700/50 
                   focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all duration-300 
                   text-slate-800 dark:text-slate-100 font-semibold shadow-sm hover:border-slate-300 dark:hover:border-slate-600;
        }
        .label-modern {
            @apply text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2 block ml-1;
        }

        #loading-screen { 
            position: fixed; inset: 0; 
            background: rgba(248, 250, 252, 0.9); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999; transition: opacity 0.6s ease;
        }
        html.dark #loading-screen { background: rgba(9, 9, 11, 0.9); color: #e2e8f0; }
        
        /* Custom Checkbox/Radio */
        input[type="radio"] {
            appearance: none; width: 1.25rem; height: 1.25rem; border-radius: 50%;
            border: 2px solid #cbd5e1; outline: none; transition: all 0.2s; position: relative;
        }
        html.dark input[type="radio"] { border-color: #52525b; }
        input[type="radio"]:checked { border-color: #4f46e5; background-color: transparent; }
        input[type="radio"]:checked::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 0.625rem; height: 0.625rem; border-radius: 50%; background-color: #4f46e5;
        }
    </style>

    <style type="text/tailwindcss">
        @layer components {
            .input-modern {
                @apply w-full px-4 py-3 rounded-2xl bg-white dark:bg-darkinput border border-slate-200 dark:border-slate-700/50 
                       focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all duration-300 
                       text-slate-800 dark:text-slate-100 font-semibold shadow-sm hover:border-slate-300 dark:hover:border-slate-600;
            }
            .label-modern {
                @apply text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2 block ml-1;
            }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkbg text-slate-800 dark:text-slate-100 pb-10">

    <div id="loading-screen">
        <div class="relative w-16 h-16 mb-4">
            <div class="absolute inset-0 rounded-full border-4 border-slate-200 dark:border-slate-800"></div>
            <div class="absolute inset-0 rounded-full border-4 border-brand-500 border-t-transparent animate-spin"></div>
        </div>
        <div class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-500 to-purple-600">Sistem Yükleniyor...</div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Component } = React;

        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("Uygulama Hatası:", error, errorInfo); }
            render() {
                if (this.state.hasError) {
                    const loader = document.getElementById('loading-screen');
                    if (loader) loader.style.display = 'none';
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-red-50 p-6 text-center">
                            <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md">
                                <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="alert-triangle" size={32} /></div>
                                <h1 className="text-2xl font-bold text-slate-800 mb-2">Sistem Hatası</h1>
                                <p className="text-slate-500 text-sm mb-6">Uygulama yüklenirken beklenmeyen bir hata oluştu. Lütfen sayfayı yenileyin.</p>
                                <button onClick={() => window.location.reload()} className="w-full py-3 bg-red-600 hover:bg-red-700 transition-colors text-white rounded-xl font-bold">Sistemi Yeniden Başlat</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children; 
            }
        }

        const Icon = ({ name, className, size = 20 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    i.setAttribute('class', className || '');
                    i.setAttribute('width', size);
                    i.setAttribute('height', size);
                    iconRef.current.innerHTML = '';
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className, size]);
            return <span ref={iconRef} style={{ display: 'inline-flex', verticalAlign: 'middle' }}></span>;
        };

        const varsayilanFiyatlar = {
            genel: { dolar_kuru: 34.00 },
            karton_ton: { krome_210: 25000, krome_225: 25500, krome_230: 26000, krome_280: 27500, krome_350_400: 29000, bristol_230: 950, bristol_300: 980, bristol_350: 1000 },
            ondule_m2: { e_ts: 8.5, e_bs: 9.0, b_ts: 8.5, b_bs: 9.0, eb_tss: 12.0, eb_bss: 13.0, eb_mksss: 14.0, yok: 0 },
            ekstra_saman: { tek_saman: 1.5, cift_saman: 3.0 },
            makine_70x100: { taban_fiyat: 5200, gecis_4_renk: 1.20, gecis_tek_renk: 0.30, kalip_tek_renk: 1300 },
            makine_100x140: { taban_fiyat: 10000, gecis_4_renk: 2.00, gecis_tek_renk: 0.50, kalip_tek_renk: 2500 },
            lak_kaplama: { yok: 0, dispersiyon_70x100: 1.5, dispersiyon_100x140: 2.0, mat_lak: 2.0, uv_lak: 2.5, parlak_selefon: 3.0, mat_selefon: 3.5, min_tutar_70x100: 2500, min_tutar_100x140: 3500 },
            iscilik: { tek_dikis: 0.50, cift_dikis: 0.80, yapistirma: 0.60, sivama: 0.30, kesim: 2.00 }
        };

        function KutuHesaplama() {
            const [ebatTabaka, setEbatTabaka] = useState({ en: 70, boy: 100 });
            const [adet, setAdet] = useState(1000);
            const [bicakSayisi, setBicakSayisi] = useState(2); 
            const [baskiTabaka, setBaskiTabaka] = useState(700); 
            const [siparisTipi, setSiparisTipi] = useState('yeni'); 
            const [nakliye, setNakliye] = useState(0);
            const [kalipUcreti, setKalipUcreti] = useState(2000); 
            
            const [kartonTip, setKartonTip] = useState('krome_230'); 
            const [onduleTip, setOnduleTip] = useState('e_ts'); 
            const [ekstraSamanSecimi, setEkstraSamanSecimi] = useState('yok'); 
            
            const [makineTipi, setMakineTipi] = useState('70x100'); 
            const [ekstraRenk, setEkstraRenk] = useState(0); 
            const [lakTipi, setLakTipi] = useState('yok');
            const [dikisTipi, setDikisTipi] = useState('tek_dikis');
            
            const [ayarlarAcik, setAyarlarAcik] = useState(false);
            const [fiyatlar, setFiyatlar] = useState(varsayilanFiyatlar);
            const [darkMode, setDarkMode] = useState(false);

            const [makineHata, setMakineHata] = useState(false);
            const [makineUyariMesaji, setMakineUyariMesaji] = useState('');

            const [sonuc, setSonuc] = useState({
                detayKarton: 0, detayOndule: 0, detayBaski: 0, detayLak: 0, detaySivama: 0, detayKesim: 0, detayYapistirma: 0,
                detayFire: 0, detayNakliye: 0, detayKalip: 0, toplamTutar: 0, birimFiyat: 0,
                kullanilanEn: 0, kullanilanBoy: 0, tabakaGram: 0, toplamTabaka: 0, 
                lakMinUygulandi: false, sivamaMinUygulandi: false
            });

            useEffect(() => {
                const loader = document.getElementById('loading-screen');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 600);
                }
            }, []);

            useEffect(() => {
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    setDarkMode(true);
                    document.documentElement.classList.add('dark');
                } else {
                    setDarkMode(false);
                    document.documentElement.classList.remove('dark');
                }
            }, []);

            const toggleDarkMode = () => {
                if (darkMode) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                    setDarkMode(false);
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                    setDarkMode(true);
                }
            };

            useEffect(() => {
                const uretimAdedi = Number(adet) || 0;
                const bicak = Number(bicakSayisi) || 1;
                const netTabaka = Math.ceil(uretimAdedi / bicak) + 200;
                setBaskiTabaka(netTabaka);
            }, [adet, bicakSayisi]);

            useEffect(() => {
                const kayitliFiyatlar = localStorage.getItem('kutu_fiyat_v16');
                if (kayitliFiyatlar) {
                    try { 
                        const par = JSON.parse(kayitliFiyatlar);
                        setFiyatlar({ ...varsayilanFiyatlar, ...par, 
                            karton_ton: {...varsayilanFiyatlar.karton_ton, ...(par.karton_ton || {})},
                            ondule_m2: {...varsayilanFiyatlar.ondule_m2, ...(par.ondule_m2 || {})},
                            ekstra_saman: {...varsayilanFiyatlar.ekstra_saman, ...(par.ekstra_saman || {})},
                            makine_70x100: {...varsayilanFiyatlar.makine_70x100, ...(par.makine_70x100 || {})},
                            makine_100x140: {...varsayilanFiyatlar.makine_100x140, ...(par.makine_100x140 || {})},
                            lak_kaplama: {...varsayilanFiyatlar.lak_kaplama, ...(par.lak_kaplama || {})},
                            iscilik: {...varsayilanFiyatlar.iscilik, ...(par.iscilik || {})}
                        }); 
                    } catch (e) { }
                }
                const kayitliGirdiler = localStorage.getItem('kutu_girdiler_v6');
                if (kayitliGirdiler) {
                    try {
                        const veri = JSON.parse(kayitliGirdiler);
                        if(veri.ebatTabaka) setEbatTabaka(veri.ebatTabaka);
                        if(veri.adet) setAdet(veri.adet);
                        if(veri.bicakSayisi) setBicakSayisi(veri.bicakSayisi);
                        if(veri.baskiTabaka) setBaskiTabaka(veri.baskiTabaka);
                        if(veri.kartonTip) setKartonTip(veri.kartonTip);
                        if(veri.onduleTip) setOnduleTip(veri.onduleTip);
                        if(veri.ekstraSamanSecimi) setEkstraSamanSecimi(veri.ekstraSamanSecimi);
                        if(veri.makineTipi) setMakineTipi(veri.makineTipi);
                        if(veri.ekstraRenk !== undefined) setEkstraRenk(veri.ekstraRenk);
                        if(veri.lakTipi) setLakTipi(veri.lakTipi);
                        if(veri.dikisTipi) setDikisTipi(veri.dikisTipi);
                        if(veri.siparisTipi) setSiparisTipi(veri.siparisTipi);
                        if(veri.nakliye !== undefined) setNakliye(veri.nakliye);
                        if(veri.kalipUcreti !== undefined) setKalipUcreti(veri.kalipUcreti);
                    } catch(e) { }
                }
            }, []);

            useEffect(() => {
                const veriler = { ebatTabaka, adet, bicakSayisi, baskiTabaka, kartonTip, onduleTip, ekstraSamanSecimi, makineTipi, ekstraRenk, lakTipi, dikisTipi, siparisTipi, nakliye, kalipUcreti };
                localStorage.setItem('kutu_girdiler_v6', JSON.stringify(veriler));
            }, [ebatTabaka, adet, bicakSayisi, baskiTabaka, kartonTip, onduleTip, ekstraSamanSecimi, makineTipi, ekstraRenk, lakTipi, dikisTipi, siparisTipi, nakliye, kalipUcreti]);

            useEffect(() => {
                const en = Number(ebatTabaka.en);
                const boy = Number(ebatTabaka.boy);

                if ((en > 72 || boy > 102) && makineTipi !== '100x140') {
                    setMakineTipi('100x140');
                }
                if (en === 72 && boy === 102 && makineTipi === '70x100') {
                    setMakineUyariMesaji('Baskı alanını kontrol ediniz. Makas dahil 72x102 olmalıdır.');
                } else {
                    setMakineUyariMesaji('');
                }
            }, [ebatTabaka, makineTipi]);

            const handleMakineSecimi = (tip) => {
                const en = Number(ebatTabaka.en);
                const boy = Number(ebatTabaka.boy);
                if (tip === '70x100') {
                    if (en > 72 || boy > 102) {
                        setMakineHata(true);
                        setMakineTipi('100x140');
                        setTimeout(() => setMakineHata(false), 3000);
                        return;
                    }
                }
                setMakineTipi(tip);
            };

            const fiyatGuncelle = (kat, alt, val) => {
                const yeni = { ...fiyatlar };
                yeni[kat][alt] = Number(val);
                setFiyatlar(yeni);
            };
            const fiyatKaydet = () => {
                localStorage.setItem('kutu_fiyat_v16', JSON.stringify(fiyatlar));
                setAyarlarAcik(false);
                // Custom Toast could go here in a real app
                alert("Sistem ayarları başarıyla kaydedildi.");
            };
            const ayarlariYedekle = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(fiyatlar));
                const node = document.createElement('a');
                node.setAttribute("href", dataStr);
                node.setAttribute("download", "maliyet_ayarlar_yedek.json");
                document.body.appendChild(node); node.click(); node.remove();
            };
            const ayarlariYukle = (e) => {
                const reader = new FileReader();
                reader.readAsText(e.target.files[0], "UTF-8");
                reader.onload = (ev) => {
                    try {
                        const json = JSON.parse(ev.target.result);
                        setFiyatlar(json);
                        localStorage.setItem('kutu_fiyat_v16', JSON.stringify(json));
                        alert("Ayarlar başarıyla yüklendi.");
                    } catch (err) { alert("Dosya formatı hatalı."); }
                };
            };

            useEffect(() => {
                const tekli = ['e_ts', 'e_bs', 'b_ts', 'b_bs'];
                if (tekli.includes(onduleTip) && ekstraSamanSecimi === 'cift') setEkstraSamanSecimi('tek');
                if (onduleTip === 'yok') setEkstraSamanSecimi('yok');
            }, [onduleTip]);

            // HESAPLAMA MOTORU
            useEffect(() => {
                const tEn = Number(ebatTabaka.en) || 0;
                const tBoy = Number(ebatTabaka.boy) || 0;
                const uretimAdedi = Number(adet) || 1;
                const tabakaBicak = Number(bicakSayisi) || 1; 
                
                const toplamTabakaSayisi = Number(baskiTabaka) || (Math.ceil(uretimAdedi / tabakaBicak) + 200);
                const netTabakaSayisi = Math.ceil(uretimAdedi / tabakaBicak);

                let gramajDegeri = 0, tonFiyati = 0;
                const kur = fiyatlar.genel.dolar_kuru || 34;
                if (kartonTip.includes('krome')) {
                    const gr = kartonTip.split('_')[1];
                    gramajDegeri = Number(gr); 
                    if(kartonTip === 'krome_350' || kartonTip === 'krome_400') tonFiyati = fiyatlar.karton_ton.krome_350_400;
                    else tonFiyati = fiyatlar.karton_ton[kartonTip];
                } else {
                    const gr = kartonTip.split('_')[1];
                    gramajDegeri = Number(gr);
                    tonFiyati = fiyatlar.karton_ton[kartonTip] * kur;
                }
                const tabakaGramaj = (tEn * tBoy * gramajDegeri * 1.03) / 10000;
                const tabakaMaliyeti = (tabakaGramaj / 1000) * (tonFiyati / 1000);
                const birimKartonMaliyeti = tabakaMaliyeti / tabakaBicak;
                const toplamKartonTutar = birimKartonMaliyeti * uretimAdedi;

                let onduleM2 = fiyatlar.ondule_m2[onduleTip] || 0;
                if (ekstraSamanSecimi === 'tek') onduleM2 += (fiyatlar.ekstra_saman.tek_saman || 0);
                if (ekstraSamanSecimi === 'cift') onduleM2 += (fiyatlar.ekstra_saman.cift_saman || 0);
                const tabakaM2Alani = (tEn * tBoy) / 10000;
                const tabakaOnduleMaliyeti = tabakaM2Alani * onduleM2;
                const birimOnduleMaliyeti = tabakaOnduleMaliyeti / tabakaBicak;
                const toplamOnduleTutar = birimOnduleMaliyeti * uretimAdedi;

                let baskiMaliyeti = 0;
                const mParams = makineTipi === '70x100' ? fiyatlar.makine_70x100 : fiyatlar.makine_100x140;
                const ekstraKRenkSayisi = Number(ekstraRenk) || 0;
                const ekstraKalipMaliyeti = ekstraKRenkSayisi * mParams.kalip_tek_renk;
                const tabanFiyatToplam = mParams.taban_fiyat + ekstraKalipMaliyeti;
                let fazlalikTutar = 0;
                if (toplamTabakaSayisi > 2000) {
                    const fazlaTabaka = toplamTabakaSayisi - 2000;
                    const birimGecisFiyati = mParams.gecis_4_renk + (ekstraKRenkSayisi * mParams.gecis_tek_renk);
                    fazlalikTutar = fazlaTabaka * birimGecisFiyati;
                }
                baskiMaliyeti = tabanFiyatToplam + fazlalikTutar;

                let lakHamTutar = 0;
                let lakMinUygulandi = false;
                if (lakTipi !== 'yok') {
                    let lakM2Fiyat = 0;
                    let minLakTutari = 0;
                    if (makineTipi === '70x100') {
                        minLakTutari = fiyatlar.lak_kaplama.min_tutar_70x100 || 2500;
                        if (lakTipi === 'dispersiyon') lakM2Fiyat = fiyatlar.lak_kaplama.dispersiyon_70x100 || 0;
                        else lakM2Fiyat = fiyatlar.lak_kaplama[lakTipi] || 0;
                    } else {
                        minLakTutari = fiyatlar.lak_kaplama.min_tutar_100x140 || 3500;
                        if (lakTipi === 'dispersiyon') lakM2Fiyat = fiyatlar.lak_kaplama.dispersiyon_100x140 || 0;
                        else lakM2Fiyat = fiyatlar.lak_kaplama[lakTipi] || 0;
                    }
                    lakHamTutar = tabakaM2Alani * lakM2Fiyat * toplamTabakaSayisi;
                    if (lakHamTutar < minLakTutari) {
                        lakHamTutar = minLakTutari;
                        lakMinUygulandi = true;
                    }
                }

                let sivamaTutar = 0;
                let sivamaMinUygulandi = false;
                if (onduleTip !== 'yok') {
                    sivamaTutar = tabakaM2Alani * fiyatlar.iscilik.sivama * netTabakaSayisi;
                    if (sivamaTutar < 3500) {
                        sivamaTutar = 3500;
                        sivamaMinUygulandi = true;
                    }
                }

                const kesimTutar = fiyatlar.iscilik.kesim * netTabakaSayisi;

                let dikisBirim = 0;
                if (dikisTipi !== 'yok') {
                    if (dikisTipi === 'tek_dikis') dikisBirim = fiyatlar.iscilik.tek_dikis;
                    if (dikisTipi === 'cift_dikis') dikisBirim = fiyatlar.iscilik.cift_dikis;
                    if (dikisTipi === 'yapistirma') dikisBirim = fiyatlar.iscilik.yapistirma;
                }
                const yapistirmaTutar = uretimAdedi * dikisBirim;

                const altToplam = toplamKartonTutar + toplamOnduleTutar + baskiMaliyeti;
                const birimUrunMaliyeti = uretimAdedi > 0 ? (altToplam / uretimAdedi) : 0;
                const fireTutari = birimUrunMaliyeti * 100;
                const kalipTutari = siparisTipi === 'yeni' ? (Number(kalipUcreti) || 0) : 0;
                const nakliyeTutari = Number(nakliye) || 0;

                const genelToplam = altToplam + lakHamTutar + sivamaTutar + kesimTutar + yapistirmaTutar + fireTutari + kalipTutari + nakliyeTutari;

                setSonuc({
                    detayKarton: toplamKartonTutar, detayOndule: toplamOnduleTutar, detayBaski: baskiMaliyeti,
                    detayLak: lakHamTutar, detaySivama: sivamaTutar, detayKesim: kesimTutar, detayYapistirma: yapistirmaTutar,
                    detayFire: fireTutari, detayKalip: kalipTutari, detayNakliye: nakliyeTutari,
                    toplamTutar: genelToplam, birimFiyat: genelToplam / uretimAdedi,
                    kullanilanEn: tEn, kullanilanBoy: tBoy, tabakaGram: tabakaGramaj, toplamTabaka: toplamTabakaSayisi,
                    lakMinUygulandi, sivamaMinUygulandi
                });

            }, [ebatTabaka, adet, bicakSayisi, baskiTabaka, kartonTip, onduleTip, ekstraSamanSecimi, makineTipi, ekstraRenk, lakTipi, dikisTipi, siparisTipi, nakliye, kalipUcreti, fiyatlar]);

            const paraFormat = (v) => new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY' }).format(v || 0);
            const sayiFormat = (v) => new Intl.NumberFormat('tr-TR').format(v || 0);
            const birim = (toplam) => (toplam || 0) / (Number(adet) || 1);

            return (
                <div className="min-h-screen px-4 py-6 md:px-8 lg:px-12 max-w-[1600px] mx-auto transition-all animate-fade-in">
                    
                    {/* Header (Glassmorphism) */}
                    <div className="glass-panel sticky top-4 z-40 rounded-3xl p-4 md:p-5 mb-8 flex justify-between items-center shadow-glass dark:shadow-glass-dark">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center text-white shadow-glow">
                                <Icon name="box" size={24} />
                            </div>
                            <div>
                                <h1 className="text-xl md:text-2xl font-extrabold text-slate-800 dark:text-slate-100 tracking-tight">OfsetX <span className="font-medium text-slate-400">Pro</span></h1>
                                <p className="text-xs font-semibold text-slate-500 dark:text-slate-400 mt-1 flex items-center gap-2">
                                    <span className="flex w-2 h-2 rounded-full bg-green-500"></span> Kur: {fiyatlar.genel.dolar_kuru}₺
                                </p>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={toggleDarkMode} className="p-3 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all shadow-sm">
                                {darkMode ? <Icon name="sun" size={20} /> : <Icon name="moon" size={20} />}
                            </button>
                            <button onClick={() => setAyarlarAcik(true)} className="flex items-center gap-2 bg-slate-800 dark:bg-white text-white dark:text-slate-900 px-5 py-3 rounded-xl font-bold text-sm transition-transform hover:scale-105 shadow-md">
                                <Icon name="settings-2" size={18} /> <span className="hidden sm:block">Ayarlar</span>
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                        
                        {/* LEFT COLUMN: Inputs */}
                        <div className="lg:col-span-7 xl:col-span-8 space-y-6 animate-slide-up" style={{animationDelay: '0.1s'}}>
                            
                            {/* Card 1: Sipariş & Ebat */}
                            <div className="bg-white/80 dark:bg-darkcard/90 backdrop-blur-xl p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-200 dark:border-slate-800/60">
                                <div className="flex items-center gap-3 mb-6">
                                    <div className="p-2 bg-brand-100 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 rounded-xl"><Icon name="file-text" size={20} /></div>
                                    <h2 className="text-lg font-bold">Temel Bilgiler</h2>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                    {/* Segmented Control for Sipariş Tipi */}
                                    <div>
                                        <label className="label-modern">Sipariş Tipi</label>
                                        <div className="flex p-1 bg-slate-100 dark:bg-slate-800/60 rounded-xl">
                                            <button onClick={()=>setSiparisTipi('yeni')} className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-300 ${siparisTipi === 'yeni' ? 'bg-white dark:bg-slate-700 text-brand-600 dark:text-brand-400 shadow-sm' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300'}`}>YENİ</button>
                                            <button onClick={()=>setSiparisTipi('rpt')} className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-300 ${siparisTipi === 'rpt' ? 'bg-white dark:bg-slate-700 text-brand-600 dark:text-brand-400 shadow-sm' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300'}`}>RPT</button>
                                        </div>
                                    </div>
                                    
                                    {/* Segmented Control for Makine */}
                                    <div className={`relative rounded-2xl transition-all ${makineHata ? 'animate-shake' : ''}`}>
                                        <label className={`label-modern ${makineHata ? 'text-red-500' : ''}`}>Baskı Makinesi</label>
                                        <div className={`flex p-1 rounded-xl transition-colors ${makineHata ? 'bg-red-100 dark:bg-red-900/30' : 'bg-slate-100 dark:bg-slate-800/60'}`}>
                                            <button onClick={()=>handleMakineSecimi('70x100')} className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-300 ${makineTipi === '70x100' ? (makineHata ? 'bg-red-500 text-white shadow-sm' : 'bg-white dark:bg-slate-700 text-brand-600 dark:text-brand-400 shadow-sm') : 'text-slate-500 dark:text-slate-400'}`}>70x100</button>
                                            <button onClick={()=>handleMakineSecimi('100x140')} className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-300 ${makineTipi === '100x140' ? 'bg-white dark:bg-slate-700 text-brand-600 dark:text-brand-400 shadow-sm' : 'text-slate-500 dark:text-slate-400'}`}>100x140</button>
                                        </div>
                                        {makineUyariMesaji && !makineHata && <p className="absolute -bottom-5 left-0 text-[10px] font-bold text-orange-500 flex items-center gap-1"><Icon name="alert-circle" size={12}/> {makineUyariMesaji}</p>}
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                                    <div><label className="label-modern">Tabaka En (cm)</label><input type="number" inputMode="decimal" value={ebatTabaka.en} onChange={e=>setEbatTabaka({...ebatTabaka, en: e.target.value})} className="input-modern" /></div>
                                    <div><label className="label-modern">Tabaka Boy (cm)</label><input type="number" inputMode="decimal" value={ebatTabaka.boy} onChange={e=>setEbatTabaka({...ebatTabaka, boy: e.target.value})} className="input-modern" /></div>
                                    <div><label className="label-modern">Bıçak (Adet)</label><input type="number" inputMode="decimal" value={bicakSayisi} onChange={e=>setBicakSayisi(e.target.value)} className="input-modern" /></div>
                                    <div><label className="label-modern">Sipariş (Adet)</label><input type="number" inputMode="decimal" value={adet} onChange={e=>setAdet(e.target.value)} className="input-modern text-brand-600 dark:text-brand-400" /></div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className={`md:col-span-1 p-1 rounded-2xl ${Number(baskiTabaka) < 1000 ? 'bg-red-50 dark:bg-red-900/10 border border-red-200 dark:border-red-800/50' : ''}`}>
                                        <label className={`label-modern ${Number(baskiTabaka) < 1000 ? 'text-red-600 dark:text-red-400' : ''}`}>Baskı Tabakası</label>
                                        <input type="number" inputMode="decimal" value={baskiTabaka} onChange={e=>setBaskiTabaka(e.target.value)} className={`input-modern ${Number(baskiTabaka) < 1000 ? 'text-red-600 dark:text-red-400 !border-red-300 dark:!border-red-700/50 focus:!ring-red-500' : ''}`} />
                                        {Number(baskiTabaka) < 1000 && <span className="text-[10px] text-red-500 font-bold mt-1 block px-1">Min 1000 (Fire dahil)</span>}
                                    </div>
                                    <div><label className="label-modern">Kalıp/Bıçak (₺)</label><input type="number" inputMode="decimal" value={kalipUcreti} onChange={e=>setKalipUcreti(e.target.value)} disabled={siparisTipi === 'rpt'} className={`input-modern ${siparisTipi === 'rpt' ? 'opacity-50 cursor-not-allowed' : ''}`} /></div>
                                    <div><label className="label-modern">Nakliye (₺)</label><input type="number" inputMode="decimal" value={nakliye} onChange={e=>setNakliye(e.target.value)} className="input-modern" /></div>
                                </div>
                            </div>

                            {/* Card 2: Kağıt & Ondüle */}
                            <div className="bg-white/80 dark:bg-darkcard/90 backdrop-blur-xl p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-200 dark:border-slate-800/60">
                                <div className="flex items-center gap-3 mb-6">
                                    <div className="p-2 bg-orange-100 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400 rounded-xl"><Icon name="layers" size={20} /></div>
                                    <h2 className="text-lg font-bold">Materyal</h2>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label className="label-modern">Karton Cinsi & Gramaj</label>
                                        <select value={kartonTip} onChange={e=>setKartonTip(e.target.value)} className="input-modern appearance-none cursor-pointer">
                                            <optgroup label="Krome (TL)"><option value="krome_210">210 gr Krome</option><option value="krome_225">225 gr Krome</option><option value="krome_230">230 gr Krome</option><option value="krome_280">280 gr Krome</option><option value="krome_350">350 gr Krome</option><option value="krome_400">400 gr Krome</option></optgroup>
                                            <optgroup label="Bristol ($)"><option value="bristol_230">230 gr Bristol</option><option value="bristol_300">300 gr Bristol</option><option value="bristol_350">350 gr Bristol</option></optgroup>
                                        </select>
                                    </div>
                                    
                                    <div className="p-5 bg-slate-50 dark:bg-slate-800/40 rounded-2xl border border-slate-200 dark:border-slate-700/50">
                                        <label className="label-modern">Ondüle Tipi</label>
                                        <select value={onduleTip} onChange={e=>setOnduleTip(e.target.value)} className="input-modern bg-white dark:bg-darkinput mb-4 appearance-none cursor-pointer">
                                            <option value="yok">Yok (Sadece Karton)</option><option value="e_ts">E TS (İnce)</option><option value="e_bs">E BS</option><option value="b_ts">B TS (Kalın)</option><option value="b_bs">B BS</option><option value="eb_tss">EB TSSS (Dopel)</option><option value="eb_bss">EB BSSS</option><option value="eb_mksss">EB MKSSS</option>
                                        </select>
                                        
                                        <div className={`transition-all duration-300 overflow-hidden ${onduleTip !== 'yok' ? 'max-h-20 opacity-100' : 'max-h-0 opacity-0'}`}>
                                            <label className="label-modern">Saman Eklemesi</label>
                                            <div className="flex gap-4">
                                                <label className="flex items-center gap-2 cursor-pointer group">
                                                    <input type="radio" checked={ekstraSamanSecimi === 'yok'} onChange={()=>setEkstraSamanSecimi('yok')} />
                                                    <span className="text-sm font-semibold text-slate-600 dark:text-slate-300 group-hover:text-brand-600 transition-colors">Standart</span>
                                                </label>
                                                <label className="flex items-center gap-2 cursor-pointer group">
                                                    <input type="radio" checked={ekstraSamanSecimi === 'tek'} onChange={()=>setEkstraSamanSecimi('tek')} />
                                                    <span className="text-sm font-semibold text-slate-600 dark:text-slate-300 group-hover:text-brand-600 transition-colors">Tek Saman</span>
                                                </label>
                                                {['eb_tss', 'eb_bss', 'eb_mksss'].includes(onduleTip) && (
                                                    <label className="flex items-center gap-2 cursor-pointer group">
                                                        <input type="radio" checked={ekstraSamanSecimi === 'cift'} onChange={()=>setEkstraSamanSecimi('cift')} />
                                                        <span className="text-sm font-semibold text-slate-600 dark:text-slate-300 group-hover:text-brand-600 transition-colors">Çift Saman</span>
                                                    </label>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Card 3: Baskı & Sonrası */}
                            <div className="bg-white/80 dark:bg-darkcard/90 backdrop-blur-xl p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-200 dark:border-slate-800/60">
                                <div className="flex items-center gap-3 mb-6">
                                    <div className="p-2 bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 rounded-xl"><Icon name="palette" size={20} /></div>
                                    <h2 className="text-lg font-bold">Baskı & Sonrası</h2>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
                                    <div>
                                        <label className="label-modern">Standart Renk</label>
                                        <div className="w-full px-4 py-3 rounded-2xl bg-slate-100 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700/50 text-slate-500 dark:text-slate-400 font-semibold text-center text-sm shadow-sm">4 Renk CMYK</div>
                                    </div>
                                    <div>
                                        <label className="label-modern">Ekstra Renk (+)</label>
                                        <div className="relative">
                                            <input type="number" min="0" value={ekstraRenk} onChange={e=>setEkstraRenk(e.target.value)} className="input-modern pl-10" />
                                            <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">+</span>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="label-modern">Yüzey Kaplama</label>
                                        <select value={lakTipi} onChange={e=>setLakTipi(e.target.value)} className="input-modern appearance-none cursor-pointer">
                                            <option value="yok">Yok</option><option value="dispersiyon">Dispersiyon Lak</option><option value="mat_lak">Mat Lak</option><option value="uv_lak">UV Lak</option><option value="parlak_selefon">Parlak Selefon</option><option value="mat_selefon">Mat Selefon</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="label-modern">Birleştirme (Dikiş)</label>
                                        <select value={dikisTipi} onChange={e=>setDikisTipi(e.target.value)} className="input-modern appearance-none cursor-pointer">
                                            <option value="yok">Yok</option><option value="tek_dikis">Tek Dikiş</option><option value="cift_dikis">Çift Dikiş</option><option value="yapistirma">Yapıştırma</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* RIGHT COLUMN: Results (Sticky) */}
                        <div className="lg:col-span-5 xl:col-span-4 lg:sticky lg:top-28 space-y-6 animate-slide-up" style={{animationDelay: '0.2s'}}>
                            
                            {/* Grand Total Card */}
                            <div className="relative overflow-hidden rounded-[2rem] p-8 shadow-2xl bg-gradient-to-br from-slate-900 to-brand-950 dark:from-slate-900 dark:to-black text-white group">
                                {/* Decorative elements */}
                                <div className="absolute top-0 right-0 p-8 opacity-20 transform translate-x-4 -translate-y-4 group-hover:scale-110 transition-transform duration-700">
                                    <Icon name="calculator" size={120} />
                                </div>
                                <div className="absolute w-40 h-40 bg-brand-500 rounded-full blur-[80px] -bottom-10 -right-10 opacity-50"></div>

                                <div className="relative z-10 flex flex-col gap-6">
                                    <div>
                                        <p className="text-brand-200 text-xs font-bold uppercase tracking-widest mb-2">Birim Fiyat (KDV Hariç)</p>
                                        <h3 className="text-5xl md:text-6xl font-black tracking-tight">{paraFormat(sonuc.birimFiyat)}</h3>
                                    </div>
                                    
                                    <div className="h-px bg-white/10 w-full my-2"></div>
                                    
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Toplam Maliyet</p>
                                            <h4 className="text-3xl font-bold">{paraFormat(sonuc.toplamTutar)}</h4>
                                        </div>
                                        <div className="text-right">
                                            <span className="inline-block px-3 py-1 bg-white/10 rounded-lg text-xs font-semibold backdrop-blur-md">
                                                {sayiFormat(adet)} Adet
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Breakdown Receipt List */}
                            <div className="bg-white/80 dark:bg-darkcard/90 backdrop-blur-xl rounded-[2rem] p-6 shadow-sm border border-slate-200 dark:border-slate-800/60">
                                <h3 className="text-sm font-bold text-slate-800 dark:text-slate-200 mb-4 px-2 flex items-center gap-2">
                                    <Icon name="receipt" size={16} className="text-brand-500"/> Maliyet Kırılımı
                                </h3>
                                
                                <div className="flex justify-between items-center py-2 px-3 mb-2 bg-slate-100 dark:bg-slate-800/50 rounded-xl">
                                    <span className="text-[11px] font-bold text-slate-500 dark:text-slate-400 w-2/5 uppercase tracking-wider">Gider Kalemi</span>
                                    <span className="text-[11px] font-bold text-slate-500 dark:text-slate-400 w-1/4 text-right uppercase tracking-wider">Birim (Ort)</span>
                                    <span className="text-[11px] font-bold text-slate-500 dark:text-slate-400 w-1/3 text-right uppercase tracking-wider">Toplam</span>
                                </div>

                                <div className="space-y-1">
                                    {[
                                        { label: 'Karton', val: sonuc.detayKarton, unit: birim(sonuc.detayKarton), show: true },
                                        { label: 'Ondüle', val: sonuc.detayOndule, unit: birim(sonuc.detayOndule), show: sonuc.detayOndule > 0 },
                                        { label: `Baskı (${makineTipi})`, val: sonuc.detayBaski, unit: birim(sonuc.detayBaski), show: true, note: `${sayiFormat(sonuc.toplamTabaka)} Tb.` },
                                        { label: 'Yüzey Kaplama', val: sonuc.detayLak, unit: birim(sonuc.detayLak), show: sonuc.detayLak > 0, min: sonuc.lakMinUygulandi },
                                        { label: 'Sıvama', val: sonuc.detaySivama, unit: birim(sonuc.detaySivama), show: sonuc.detaySivama > 0, min: sonuc.sivamaMinUygulandi },
                                        { label: 'Kesim', val: sonuc.detayKesim, unit: birim(sonuc.detayKesim), show: true },
                                        { label: 'Birleştirme', val: sonuc.detayYapistirma, unit: birim(sonuc.detayYapistirma), show: true },
                                        { label: 'Fire Bedeli', val: sonuc.detayFire, unit: birim(sonuc.detayFire), show: true, color: 'text-red-500' },
                                        { label: 'Nakliye', val: sonuc.detayNakliye, unit: birim(sonuc.detayNakliye), show: true, color: 'text-orange-500' },
                                        { label: 'Kalıp/Bıçak (Yeni)', val: sonuc.detayKalip, unit: birim(sonuc.detayKalip), show: sonuc.detayKalip > 0, color: 'text-brand-500' },
                                    ].map((item, idx) => item.show && (
                                        <div key={idx} className="flex justify-between items-center py-3 px-3 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors border-b border-slate-100 dark:border-slate-800/50 last:border-0">
                                            <div className="flex flex-col w-2/5 pr-2">
                                                <span className={`text-sm font-semibold ${item.color || 'text-slate-700 dark:text-slate-300'}`}>
                                                    {item.label} {item.min && <span className="text-[9px] text-red-500 ml-1 uppercase bg-red-100 dark:bg-red-900/30 px-1 rounded">(Min)</span>}
                                                </span>
                                                {item.note && <span className="text-[10px] text-slate-400 font-medium mt-0.5">{item.note}</span>}
                                            </div>
                                            <div className="w-1/4 text-right">
                                                <span className="text-xs text-slate-500 dark:text-slate-400 font-mono font-medium">{paraFormat(item.unit)}</span>
                                            </div>
                                            <div className="w-1/3 text-right">
                                                <span className={`text-sm font-bold font-mono ${item.color || 'text-slate-800 dark:text-slate-200'}`}>{paraFormat(item.val)}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                        </div>
                    </div>

                    {/* SETTINGS MODAL (Frosted Glass) */}
                    {ayarlarAcik && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-slate-900/40 backdrop-blur-md" onClick={()=>setAyarlarAcik(false)}>
                            <div className="bg-white/95 dark:bg-darkcard/95 backdrop-blur-2xl rounded-[2rem] shadow-2xl border border-white/20 dark:border-slate-700 w-full max-w-4xl max-h-[90vh] flex flex-col transform transition-all animate-slide-up" onClick={e=>e.stopPropagation()}>
                                
                                <div className="p-6 md:p-8 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center bg-slate-50/50 dark:bg-slate-800/30 rounded-t-[2rem]">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-slate-200 dark:bg-slate-700 rounded-lg text-slate-700 dark:text-slate-300"><Icon name="sliders" size={20} /></div>
                                        <h2 className="text-xl font-bold text-slate-800 dark:text-slate-100">Sistem Parametreleri</h2>
                                    </div>
                                    <button onClick={()=>setAyarlarAcik(false)} className="w-10 h-10 flex items-center justify-center rounded-full bg-slate-200/50 dark:bg-slate-700/50 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors"><Icon name="x" size={20} /></button>
                                </div>
                                
                                <div className="p-6 md:p-8 overflow-y-auto space-y-10 custom-scrollbar">
                                    
                                    {/* Genel */}
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="p-5 bg-brand-50 dark:bg-brand-900/10 rounded-2xl border border-brand-100 dark:border-brand-800/30">
                                            <label className="label-modern text-brand-700 dark:text-brand-400">AKTÜEL DOLAR KURU</label>
                                            <input type="number" step="0.01" value={fiyatlar.genel.dolar_kuru} onChange={e=>fiyatGuncelle('genel','dolar_kuru',e.target.value)} className="input-modern bg-white dark:bg-darkinput" />
                                        </div>
                                    </div>

                                    {/* Kartonlar */}
                                    <div>
                                        <h3 className="text-sm font-bold text-slate-800 dark:text-slate-200 mb-4 flex items-center gap-2 uppercase tracking-wider"><Icon name="package" size={16} className="text-slate-400" /> Krome Karton (TL/TON)</h3>
                                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                                            {Object.keys(fiyatlar.karton_ton).filter(k=>k.includes('krome')).map(k=>(
                                                <div key={k}><label className="label-modern">{k.replace('krome_','')}</label><input type="number" value={fiyatlar.karton_ton[k]} onChange={e=>fiyatGuncelle('karton_ton',k,e.target.value)} className="input-modern font-mono text-sm" /></div>
                                            ))}
                                        </div>
                                        
                                        <h3 className="text-sm font-bold text-slate-800 dark:text-slate-200 mt-8 mb-4 flex items-center gap-2 uppercase tracking-wider"><Icon name="package" size={16} className="text-slate-400" /> Bristol Karton ($/TON)</h3>
                                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                                            {Object.keys(fiyatlar.karton_ton).filter(k=>k.includes('bristol')).map(k=>(
                                                <div key={k}><label className="label-modern text-green-600 dark:text-green-500">{k.replace('bristol_','')}</label><input type="number" value={fiyatlar.karton_ton[k]} onChange={e=>fiyatGuncelle('karton_ton',k,e.target.value)} className="input-modern font-mono text-sm border-green-200 dark:border-green-900/50" /></div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Ondüle */}
                                    <div>
                                        <h3 className="text-sm font-bold text-slate-800 dark:text-slate-200 mb-4 flex items-center gap-2 uppercase tracking-wider"><Icon name="layers" size={16} className="text-slate-400" /> Ondüle m² (TL)</h3>
                                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-6">
                                            {Object.keys(fiyatlar.ondule_m2).filter(k=>k!=='yok').map(k=>(
                                                <div key={k}><label className="label-modern">{k.replace('_',' ')}</label><input type="number" step="0.1" value={fiyatlar.ondule_m2[k]} onChange={e=>fiyatGuncelle('ondule_m2',k,e.target.value)} className="input-modern font-mono text-sm" /></div>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div className="p-4 bg-orange-50 dark:bg-orange-900/10 rounded-2xl border border-orange-100 dark:border-orange-800/30">
                                                <label className="label-modern text-orange-700 dark:text-orange-400">Tek Saman Farkı</label>
                                                <input type="number" step="0.1" value={fiyatlar.ekstra_saman.tek_saman} onChange={e=>fiyatGuncelle('ekstra_saman','tek_saman',e.target.value)} className="input-modern bg-white dark:bg-darkinput" />
                                            </div>
                                            <div className="p-4 bg-orange-50 dark:bg-orange-900/10 rounded-2xl border border-orange-100 dark:border-orange-800/30">
                                                <label className="label-modern text-orange-700 dark:text-orange-400">Çift Saman Farkı</label>
                                                <input type="number" step="0.1" value={fiyatlar.ekstra_saman.cift_saman} onChange={e=>fiyatGuncelle('ekstra_saman','cift_saman',e.target.value)} className="input-modern bg-white dark:bg-darkinput" />
                                            </div>
                                        </div>
                                    </div>

                                    {/* Makineler */}
                                    <div className="grid md:grid-cols-2 gap-8">
                                        <div className="p-6 bg-slate-50 dark:bg-slate-800/30 rounded-3xl border border-slate-200 dark:border-slate-700">
                                            <h3 className="font-bold text-slate-800 dark:text-slate-200 mb-5 flex items-center gap-2"><Icon name="printer" size={18} className="text-brand-500" /> 70x100 Makine</h3>
                                            <div className="space-y-4">
                                                <div><label className="label-modern">Taban (2000'e kadar)</label><input type="number" value={fiyatlar.makine_70x100.taban_fiyat} onChange={e=>fiyatGuncelle('makine_70x100','taban_fiyat',e.target.value)} className="input-modern bg-white dark:bg-darkinput" /></div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div><label className="label-modern">2000+ Geçiş</label><input type="number" step="0.01" value={fiyatlar.makine_70x100.gecis_4_renk} onChange={e=>fiyatGuncelle('makine_70x100','gecis_4_renk',e.target.value)} className="input-modern bg-white dark:bg-darkinput" /></div>
                                                    <div><label className="label-modern">Eks. Renk Geçiş</label><input type="number" step="0.01" value={fiyatlar.makine_70x100.gecis_tek_renk} onChange={e=>fiyatGuncelle('makine_70x100','gecis_tek_renk',e.target.value)} className="input-modern bg-white dark:bg-darkinput" /></div>
                                                </div>
                                                <div><label className="label-modern">Eks. Renk Kalıp</label><input type="number" value={fiyatlar.makine_70x100.kalip_tek_renk} onChange={e=>fiyatGuncelle('makine_70x100','kalip_tek_renk',e.target.value)} className="input-modern bg-white dark:bg-darkinput" /></div>
                                            </div>
                                        </div>
                                        <div className="p-6 bg-slate-50 dark:bg-slate-800/30 rounded-3xl border border-slate-200 dark:border-slate-700">
                                            <h3 className="font-bold text-slate-800 dark:text-slate-200 mb-5 flex items-center gap-2"><Icon name="printer" size={18} className="text-brand-500" /> 100x140 Makine</h3>
                                            <div className="space-y-4">
                                                <div><label className="label-modern">Taban (2000'e kadar)</label><input type="number" value={fiyatlar.makine_100x140.taban_fiyat} onChange={e=>fiyatGuncelle('makine_100x140','taban_fiyat',e.target.value)} className="input-modern bg-white dark:bg-darkinput" /></div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div><label className="label-modern">2000+ Geçiş</label><input type="number" step="0.01" value={fiyatlar.makine_100x140.gecis_4_renk} onChange={e=>fiyatGuncelle('makine_100x140','gecis_4_renk',e.target.value)} className="input-modern bg-white dark:bg-darkinput" /></div>
                                                    <div><label className="label-modern">Eks. Renk Geçiş</label><input type="number" step="0.01" value={fiyatlar.makine_100x140.gecis_tek_renk} onChange={e=>fiyatGuncelle('makine_100x140','gecis_tek_renk',e.target.value)} className="input-modern bg-white dark:bg-darkinput" /></div>
                                                </div>
                                                <div><label className="label-modern">Eks. Renk Kalıp</label><input type="number" value={fiyatlar.makine_100x140.kalip_tek_renk} onChange={e=>fiyatGuncelle('makine_100x140','kalip_tek_renk',e.target.value)} className="input-modern bg-white dark:bg-darkinput" /></div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Lak & İşçilik */}
                                    <div>
                                        <h3 className="text-sm font-bold text-slate-800 dark:text-slate-200 mb-4 flex items-center gap-2 uppercase tracking-wider"><Icon name="hammer" size={16} className="text-slate-400" /> Lak & İşçilikler</h3>
                                        
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                                            <div className="p-3 bg-purple-50 dark:bg-purple-900/10 rounded-2xl border border-purple-100 dark:border-purple-800/30 col-span-2">
                                                <label className="label-modern text-purple-700 dark:text-purple-400">Dispersiyon Lak (70x100)</label>
                                                <input type="number" step="0.1" value={fiyatlar.lak_kaplama.dispersiyon_70x100} onChange={e=>fiyatGuncelle('lak_kaplama','dispersiyon_70x100',e.target.value)} className="input-modern bg-white dark:bg-darkinput" />
                                            </div>
                                            <div className="p-3 bg-purple-50 dark:bg-purple-900/10 rounded-2xl border border-purple-100 dark:border-purple-800/30 col-span-2">
                                                <label className="label-modern text-purple-700 dark:text-purple-400">Dispersiyon Lak (100x140)</label>
                                                <input type="number" step="0.1" value={fiyatlar.lak_kaplama.dispersiyon_100x140} onChange={e=>fiyatGuncelle('lak_kaplama','dispersiyon_100x140',e.target.value)} className="input-modern bg-white dark:bg-darkinput" />
                                            </div>
                                            <div className="p-3 bg-slate-100 dark:bg-slate-800/50 rounded-2xl col-span-2">
                                                <label className="label-modern">Min Lak Bedeli (70x100)</label>
                                                <input type="number" value={fiyatlar.lak_kaplama.min_tutar_70x100} onChange={e=>fiyatGuncelle('lak_kaplama','min_tutar_70x100',e.target.value)} className="input-modern bg-white dark:bg-darkinput" />
                                            </div>
                                            <div className="p-3 bg-slate-100 dark:bg-slate-800/50 rounded-2xl col-span-2">
                                                <label className="label-modern">Min Lak Bedeli (100x140)</label>
                                                <input type="number" value={fiyatlar.lak_kaplama.min_tutar_100x140} onChange={e=>fiyatGuncelle('lak_kaplama','min_tutar_100x140',e.target.value)} className="input-modern bg-white dark:bg-darkinput" />
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                                            {Object.keys(fiyatlar.lak_kaplama).filter(k=>!k.includes('dispersiyon') && !k.includes('min_tutar') && k!=='yok').map(k=>(
                                                <div key={k}><label className="label-modern">{k.replace('_',' ')} (m²)</label><input type="number" step="0.1" value={fiyatlar.lak_kaplama[k]} onChange={e=>fiyatGuncelle('lak_kaplama',k,e.target.value)} className="input-modern font-mono text-sm" /></div>
                                            ))}
                                            {Object.keys(fiyatlar.iscilik).filter(k=>k!=='selefon').map(k=>(
                                                <div key={k}><label className="label-modern">{k.replace('_',' ')} (Ad/Tb)</label><input type="number" step="0.01" value={fiyatlar.iscilik[k]} onChange={e=>fiyatGuncelle('iscilik',k,e.target.value)} className="input-modern font-mono text-sm" /></div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="p-6 md:p-8 border-t border-slate-200 dark:border-slate-800 flex flex-col sm:flex-row justify-between gap-4 bg-slate-50/50 dark:bg-slate-800/30 rounded-b-[2rem]">
                                    <div className="flex gap-3">
                                        <button onClick={ayarlariYedekle} className="px-5 py-3 rounded-xl bg-white dark:bg-darkinput border border-slate-200 dark:border-slate-700 font-bold text-sm hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors flex items-center justify-center gap-2"><Icon name="download" size={16} /> Yedekle</button>
                                        <label className="px-5 py-3 rounded-xl bg-white dark:bg-darkinput border border-slate-200 dark:border-slate-700 font-bold text-sm cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors flex items-center justify-center gap-2"><Icon name="upload" size={16} /> Yükle<input type="file" accept=".json" onChange={ayarlariYukle} className="hidden" /></label>
                                    </div>
                                    <button onClick={fiyatKaydet} className="px-8 py-3 bg-brand-600 hover:bg-brand-500 text-white rounded-xl font-bold transition-colors shadow-glow flex items-center justify-center gap-2"><Icon name="check" size={18} /> Ayarları Kaydet</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><KutuHesaplama /></ErrorBoundary>);
    </script>
</body>
</html>
